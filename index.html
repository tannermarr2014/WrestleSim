<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WrestleSIM</title>
  <style>
    :root{
      --bg:#090a0f; --panel:#141722; --panel2:#1b2030; --panel3:#252b3d;
      --text:#f6f4ee; --muted:#aab0c0; --line:rgba(255,255,255,.12);
      --red:#e62435; --gold:#f5b73b; --green:#35c875; --blue:#5da8ff; --bad:#ff5b68; --warn:#ffd15a;
      --shadow:0 12px 28px rgba(0,0,0,.32); --r:18px;
    }
    *{box-sizing:border-box} html{scroll-behavior:auto} body{margin:0;background:radial-gradient(circle at top left, rgba(230,36,53,.18), transparent 35%),linear-gradient(135deg,#07080d,#111522 58%,#090a0f);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;}
    button,input,select{font:inherit} button{cursor:pointer}
    .wrap{width:min(1440px,calc(100% - 28px));margin:0 auto;padding:22px 0 50px}
    .hero{display:flex;justify-content:space-between;gap:18px;align-items:center;border:1px solid var(--line);border-radius:28px;background:linear-gradient(135deg,rgba(255,255,255,.09),rgba(255,255,255,.03));box-shadow:var(--shadow);padding:24px;overflow:hidden;position:relative}
    .hero:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(120deg,transparent 0 24px,rgba(255,255,255,.035) 24px 25px);pointer-events:none}.hero>*{position:relative}
    .eyebrow{margin:0 0 5px;color:var(--gold);font-weight:900;letter-spacing:.18em;text-transform:uppercase;font-size:.78rem}.logo{margin:0;font-size:clamp(3rem,7vw,7rem);line-height:.86;text-transform:uppercase;letter-spacing:-.08em}.logo span{color:var(--red)}.tag{margin:10px 0 0;color:var(--muted);font-size:1.05rem;max-width:760px}
    .heroBtns{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn,.tab,.miniBtn{border:1px solid var(--line);border-radius:999px;padding:10px 15px;font-weight:900;color:var(--text);background:rgba(255,255,255,.07)}.btn{background:linear-gradient(135deg,var(--red),#99131f)}.btn.secondary,.tab{background:rgba(255,255,255,.07)}.btn.good{background:linear-gradient(135deg,#24ad62,#176c3a)}.btn.warn{background:linear-gradient(135deg,#c78c19,#8a5610)}.btn.bad{background:linear-gradient(135deg,#dd3240,#81141d)}.btn:disabled{opacity:.45;cursor:not-allowed}.miniBtn{padding:7px 11px;font-size:.83rem}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.tab.active{background:linear-gradient(135deg,var(--red),#99131f)}
    .grid{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.panel{border:1px solid var(--line);background:rgba(20,23,34,.92);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}.panel.alt{background:rgba(27,32,48,.86)}.panel h2,.panel h3{margin:0 0 6px}.panel p{color:var(--muted);line-height:1.45}.sectionTitle{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.sectionTitle p{margin:.3rem 0 0;color:var(--muted)}
    .metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:16px 0}.metric{border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:16px;padding:12px}.metric small{display:block;color:var(--muted);font-weight:800;text-transform:uppercase;font-size:.71rem;letter-spacing:.08em}.metric b{font-size:1.35rem}.sub{display:block;color:var(--muted);font-size:.8rem;margin-top:2px}.goodTxt{color:var(--green)!important}.badTxt{color:var(--bad)!important}.warnTxt{color:var(--warn)!important}.goldTxt{color:var(--gold)!important}.blueTxt{color:var(--blue)!important}
    .tabPanel{display:none}.tabPanel.active{display:block}.list{display:flex;flex-direction:column;gap:10px}.card{border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:16px;padding:14px}.cardTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.pill{display:inline-flex;gap:5px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:5px 9px;background:rgba(255,255,255,.07);font-size:.78rem;font-weight:900}.pill.red{background:rgba(230,36,53,.16);color:#ffd3d8}.pill.gold{background:rgba(245,183,59,.14);color:#ffe4a5}.pill.good{background:rgba(53,200,117,.15);color:#c6ffd9}.pill.bad{background:rgba(255,91,104,.13);color:#ffd5d9}.pill.blue{background:rgba(93,168,255,.14);color:#d6eaff}
    .decision{border-left:5px solid var(--gold)}.decision h3{margin-bottom:4px}.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}.choice{border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:15px;padding:12px;text-align:left}.choice:hover{border-color:rgba(245,183,59,.55)}.choice b{display:block;margin-bottom:4px}.choice small{display:block;color:var(--muted);line-height:1.35}.choice .pros{color:#bfffd4}.choice .cons{color:#ffd2d6}
    .bar{height:9px;border-radius:999px;background:rgba(255,255,255,.09);overflow:hidden;margin-top:8px}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--gold))}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.field{display:flex;flex-direction:column;gap:5px}.field label{font-size:.77rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900}select,input{border:1px solid var(--line);background:#0e111b;color:var(--text);border-radius:12px;padding:10px;min-width:120px}.match{border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:16px;padding:14px;margin-bottom:12px}.matchGrid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}.wide{grid-column:span 2}.rosterGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.wCard{border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:16px;padding:14px}.wCard h3{margin:0}.statline{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.tiny{font-size:.82rem;color:var(--muted)}.newsItem{display:flex;gap:10px;align-items:flex-start}.dot{width:10px;height:10px;border-radius:50%;margin-top:6px;background:var(--blue);flex:0 0 auto}.dot.good{background:var(--green)}.dot.bad{background:var(--bad)}.dot.warn{background:var(--warn)}
    .modalRoot{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.62);padding:16px}.modal{width:min(760px,100%);border:1px solid var(--line);border-radius:22px;background:#151925;box-shadow:var(--shadow);padding:20px}.modalActions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:16px}.toast{position:fixed;right:18px;bottom:18px;background:#151925;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:12px 15px;z-index:20}.empty{border:1px dashed var(--line);border-radius:16px;padding:18px;text-align:center;color:var(--muted)}
    @media(max-width:1000px){.grid,.grid3,.grid4,.rosterGrid,.choices,.metrics{grid-template-columns:1fr}.matchGrid{grid-template-columns:1fr}.wide{grid-column:auto}.hero{align-items:flex-start;flex-direction:column}.heroBtns{justify-content:flex-start}}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div><p class="eyebrow">Reaction-Based Wrestling Promotion Simulator</p><h1 class="logo">Wrestle<span>SIM</span></h1><p class="tag">Run a broke indy fed, deal with egos, sponsors, rivals, fan backlash, promises, injuries, and every ugly decision that comes with chasing the big leagues.</p></div>
      <div class="heroBtns"><button class="btn secondary" onclick="saveGame()">Save</button><button class="btn secondary" onclick="loadGame()">Load</button><button class="btn bad" onclick="confirmNewGame()">New Game</button></div>
    </header>
    <div id="metrics" class="metrics"></div>
    <nav class="tabs">
      <button class="tab active" data-tab="office" onclick="tab('office')">Owner's Office</button>
      <button class="tab" data-tab="booking" onclick="tab('booking')">Book Show</button>
      <button class="tab" data-tab="roster" onclick="tab('roster')">Roster</button>
      <button class="tab" data-tab="market" onclick="tab('market')">Free Agents</button>
      <button class="tab" data-tab="strategy" onclick="tab('strategy')">Strategy</button>
      <button class="tab" data-tab="history" onclick="tab('history')">History</button>
    </nav>
    <main>
      <section id="office" class="tabPanel active"></section>
      <section id="booking" class="tabPanel"></section>
      <section id="roster" class="tabPanel"></section>
      <section id="market" class="tabPanel"></section>
      <section id="strategy" class="tabPanel"></section>
      <section id="history" class="tabPanel"></section>
    </main>
  </div>
  <div id="modalHost"></div>
<script>
const STORAGE_KEY = "wrestlesim_save_v2_reaction";
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const money=n=>(n<0?"-$":"$")+Math.abs(Math.round(n)).toLocaleString();
const pct=n=>Math.round(n)+"%";
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const id=()=>crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2);
let state, currentTab="office", booking=null;

const names=["Ace Steel","Mason Cross","Rex Graves","Jett Vega","Duke Stone","Colt Rivers","Dante Black","Knox Knight","Ryder Storm","Gunner Hayes","Cash Mercer","Brody Price","Vince Wilde","Maverick Reed","Silas Bishop","Axel Frost","Luca Cage","Hawk Lawson","Nico Archer","Roman Slade","Blaine Winters","Kade King","Tyson Hallow","Logan Fox","Drake Hendrix"];
const gimmicks=["The Workhorse","Big Money","The Outlaw","Main Event","The Machine","The Blueprint","The Prospect","The Hammer","The Wildcard","No Mercy","The Real Deal","The Franchise","The Problem","The Showpiece","The Rebel","The Technician"];
const archetypes=["Brawler","Technician","High Flyer","Powerhouse","Talker","Hardcore","Veteran","Prospect","Monster","All-Rounder"];
const matchTypes={
  singles:{name:"Singles",count:2,risk:4,cost:0,fan:0}, tag:{name:"Tag Team",count:4,risk:5,cost:350,fan:4}, triple:{name:"Triple Threat",count:3,risk:7,cost:300,fan:5}, four:{name:"Fatal 4-Way",count:4,risk:8,cost:450,fan:7},
  hardcore:{name:"Hardcore",count:2,risk:16,cost:950,fan:10}, cage:{name:"Steel Cage",count:2,risk:14,cost:1400,fan:13}, ladder:{name:"Ladder",count:2,risk:18,cost:1700,fan:15}
};
const venues={
  gym:{name:"Old Rec Gym",capacity:420,cost:900,rep:0,desc:"Cheap, ugly, safe. Good for survival weeks."},
  bingo:{name:"Bingo Hall",capacity:850,cost:1900,rep:1,desc:"Classic indy feel. Fans forgive the rough edges."},
  armory:{name:"County Armory",capacity:1600,cost:3900,rep:3,desc:"More seats, more pressure, more noise."},
  theater:{name:"Downtown Theater",capacity:2800,cost:7600,rep:5,desc:"Looks big league if you can fill it."},
  arena:{name:"Mini Arena",capacity:5200,cost:15000,rep:8,desc:"A gamble. Empty seats can bury your momentum."}
};
const tiers=[
  {name:"Lousy Indy Fed",fans:0,target:"survive without going broke"},
  {name:"Hot Local Promotion",fans:4000,target:"own your home territory"},
  {name:"Regional Player",fans:13000,target:"tour outside your city"},
  {name:"National TV Threat",fans:42000,target:"make the giants notice you"},
  {name:"Major League Promotion",fans:110000,target:"compete with AEW and WWE-sized companies"}
];
const pushValue={Enhancement:0,Midcard:7,"Upper Card":14,Ace:22};

function pick(arr){return arr[rnd(0,arr.length-1)]}
function weighted(items){let t=items.reduce((s,i)=>s+i.w,0),r=Math.random()*t;for(const i of items){r-=i.w;if(r<=0)return i.v}return items[0].v}
function tier(){return [...tiers].reverse().find(t=>state.fans>=t.fans)||tiers[0]}
function nextTier(){return tiers.find(t=>state.fans<t.fans)}
function payroll(){return state.roster.reduce((s,w)=>s+w.pay,0)}
function topRoster(){return [...state.roster].sort((a,b)=>scoreW(b)-scoreW(a))}
function scoreW(w){return w.overness+w.momentum+w.skill+w.charisma+w.look+pushValue[w.push]}
function wrestler(idv){return state.roster.find(w=>w.id===idv)}
function log(msg,type="info"){state.news.unshift({id:id(),week:state.week,msg,type});state.news=state.news.slice(0,90)}
function hist(entry){state.history.unshift({id:id(),week:state.week,...entry});state.history=state.history.slice(0,80)}
function toast(msg){const el=document.createElement("div");el.className="toast";el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2200)}

function makeW(seed={}){
  const arch=seed.arch||pick(archetypes); const base=seed.base||rnd(34,62); const mod={Brawler:[8,-2,4,-2,3],Technician:[10,-2,-1,9,0],"High Flyer":[5,4,5,-3,3],Powerhouse:[2,-3,11,-2,4],Talker:[-2,14,3,1,5],Hardcore:[2,4,2,-8,7],Veteran:[8,5,-2,9,1],Prospect:[1,2,4,1,-2],Monster:[-2,-2,15,-5,6],"All-Rounder":[5,5,5,5,5]}[arch];
  const st={skill:clamp(base+mod[0]+rnd(-8,8),15,95),charisma:clamp(base+mod[1]+rnd(-8,8),12,96),look:clamp(base+mod[2]+rnd(-9,9),15,97),safety:clamp(base+mod[3]+rnd(-8,8),8,96),overness:clamp(base+mod[4]+rnd(-9,9),8,92)};
  const val=Math.round((st.skill+st.charisma+st.look+st.safety+st.overness)/5);
  return {id:id(),name:seed.name||pick(names),gimmick:seed.gimmick||pick(gimmicks),arch,age:seed.age||rnd(21,44),...st,momentum:seed.momentum??rnd(38,62),morale:seed.morale??rnd(50,82),fatigue:seed.fatigue??rnd(4,24),ego:seed.ego??rnd(15,85),reliability:seed.reliability??rnd(42,94),contract:seed.contract??rnd(12,32),pay:seed.pay??Math.round(val*rnd(34,58)/10)*10,push:seed.push||weighted([{v:"Enhancement",w:30},{v:"Midcard",w:48},{v:"Upper Card",w:18},{v:"Ace",w:4}]),injured:0,wins:0,losses:0,complaints:0,lastBooked:-99};
}
function starterRoster(){return [
  makeW({name:"Ace Monroe",gimmick:"The Franchise",arch:"Talker",base:62,push:"Ace",pay:610,morale:72,ego:76}),
  makeW({name:"Rex Maddox",gimmick:"No Mercy",arch:"Powerhouse",base:58,push:"Upper Card",pay:520,morale:64,ego:70}),
  makeW({name:"Caleb Cross",gimmick:"The Workhorse",arch:"Technician",base:56,push:"Upper Card",pay:480,morale:80,ego:38}),
  makeW({name:"Jett Raines",gimmick:"The Wildcard",arch:"High Flyer",base:52,push:"Midcard",pay:400,morale:67,ego:55}),
  makeW({name:"Knox Rivers",gimmick:"The Outlaw",arch:"Brawler",base:50,push:"Midcard",pay:380,morale:58,ego:63}),
  makeW({name:"Duke Hallow",gimmick:"The Hammer",arch:"Hardcore",base:48,push:"Midcard",pay:360,morale:61,ego:45}),
  makeW({name:"Silas Vega",gimmick:"The Prospect",arch:"Prospect",base:45,push:"Enhancement",pay:260,morale:76,ego:30}),
  makeW({name:"Mason Price",gimmick:"The Real Deal",arch:"All-Rounder",base:47,push:"Enhancement",pay:300,morale:69,ego:47})
]}
function makeFAs(n=10){return Array.from({length:n},()=>makeW({base:rnd(32,68),contract:rnd(14,36),pay:rnd(260,1050)}))}

function newGame(){
  state={version:2,promotion:"WrestleSIM Wrestling",week:1,cash:26000,debt:0,fans:1350,reputation:14,fanSat:52,locker:58,sponsor:34,momentum:45,heat:18,production:1,marketing:900,ticket:18,merch:1,style:"Balanced",risk:"Balanced",venue:"gym",showType:"weekly",title:null,roster:starterRoster(),freeAgents:makeFAs(12),rivalries:[],commitments:[],pending:[],news:[],history:[],lastShow:null,bookedThisWeek:false};
  state.title=state.roster[0].id; initBooking(); seedDecisions(); log("You bought a struggling indy fed. The ring is ugly, the roster is moody, and the dream is alive.","info"); render(); toast("New game started");
}
function confirmNewGame(){modal("Start New Game?","<p>This will wipe the current browser save if you save over it.</p>",[{label:"Start over",cls:"btn bad",fn:()=>{closeModal();newGame()}},{label:"Cancel",cls:"btn secondary",fn:closeModal}])}
function initBooking(){
  const slots=state.showType==="big"?6:4;
  booking={name:state.showType==="big"?`WrestleSIM Big Show ${Math.ceil(state.week/4)}`:`WrestleSIM Weekly #${state.week}`,showType:state.showType,venue:state.venue,slots:Array.from({length:slots},(_,i)=>({type:i===slots-1?"singles":"singles",stakes:i===slots-1?"Main Event":i===0?"Opener":"Showcase",wrestlers:[],promo:i===1,title:i===slots-1&&state.showType==="big",finish:"Clean"}))};
}

function seedDecisions(){
  if(state.pending.length) return;
  const list=[]; const top=topRoster()[0], second=topRoster()[1], lowMorale=state.roster.find(w=>w.morale<50), highEgo=state.roster.find(w=>w.ego>68), tired=state.roster.find(w=>w.fatigue>62), prospect=state.roster.find(w=>w.push==="Enhancement"||w.arch==="Prospect");
  list.push(decSponsorSafe());
  if(top) list.push(decPoach(top));
  if(lowMorale) list.push(decMorale(lowMorale));
  if(highEgo) list.push(decCreativeControl(highEgo));
  if(tired) list.push(decInjury(tired));
  if(prospect) list.push(decProspect(prospect));
  if(state.reputation>18) list.push(decTVScout());
  list.push(decVenueGamble()); list.push(decMerch()); list.push(decFanDemand(second||top)); list.push(decLockerStandard()); list.push(decLoanShark());
  state.pending=list.sort(()=>Math.random()-.5).slice(0,2).map(d=>({...d,id:id()}));
}
function choice(label,pros,cons,fn){return{label,pros,cons,fn}}
function decSponsorSafe(){return{title:"Sponsor Wants A Cleaner Product",tag:"Sponsor Pressure",text:"A local sponsor will pay upfront, but they want the next two shows kept sponsor-safe: no bloodbath main events, no ladder/cage/hardcore chaos, and production cannot look bush league.",choices:[choice("Take the sponsor money","+$5,000 now. Sponsor trust can climb if you behave.","For 2 shows, high-risk booking can trigger a sponsor backlash.",()=>{state.cash+=5000;state.sponsor+=3;addCommit("Sponsor-safe product",2,"Keep match risk under 38 and avoid hardcore/cage/ladder matches for two shows.",s=>s.totalRisk<38&&!s.usedDanger,()=>{state.sponsor=clamp(state.sponsor+9,0,100);state.cash+=2500;log("Sponsor loved the cleaner product and renewed a small bonus.","good")},()=>{state.sponsor=clamp(state.sponsor-18,0,100);state.cash-=2000;log("Sponsor backlash: your product broke the safety promise.","bad")},"survive");}),choice("Reject it","No restrictions. Fans respect that you won’t water it down.","You pass on quick money.",()=>{state.fanSat=clamp(state.fanSat+2,0,100);log("You rejected the sponsor restrictions and kept booking freedom.","info")}),choice("Negotiate loose terms","+$2,500 and only one safe show required.","Smaller payday; failing still hurts trust.",()=>{state.cash+=2500;addCommit("One safe showcase",1,"Avoid dangerous match types this week.",s=>!s.usedDanger,()=>{state.sponsor=clamp(state.sponsor+5,0,100);log("The sponsor accepted your safer showcase.","good")},()=>{state.sponsor=clamp(state.sponsor-10,0,100);log("Sponsor disliked the chaos and cooled off.","warn")});})]}}
function decPoach(w){return{title:`Bigger Company Circling ${w.name}`,tag:"Talent War",text:`${w.name} says a rival office has been calling. They want proof that this place has a future.`,choices:[choice("Offer a raise","Morale +14. Reduces walkout risk.",`Payroll increases by ${money(180)} per week.`,()=>{w.pay+=180;w.morale=clamp(w.morale+14,0,100);w.ego=clamp(w.ego+3,0,100);log(`${w.name} got paid to stay loyal... for now.`,"good")}),choice("Promise the main event","No money spent. Big morale bump if you deliver.","If you don’t main event them by the due date, morale tanks.",()=>{w.morale=clamp(w.morale+5,0,100);addCommit(`Main event promise: ${w.name}`,2,`Book ${w.name} in the main event within 2 shows.`,s=>s.mainIds.includes(w.id),()=>{w.morale=clamp(w.morale+15,0,100);w.momentum=clamp(w.momentum+7,0,100);log(`${w.name} got the promised spotlight and bought in.`,"good")},()=>{w.morale=clamp(w.morale-24,0,100);w.ego=clamp(w.ego+9,0,100);log(`${w.name} was promised the main event and didn't get it. The relationship soured.`,"bad")})}),choice("Call their bluff","Keeps payroll down and proves nobody is above the company.","Morale hit. If locker room is weak, this can spread.",()=>{w.morale=clamp(w.morale-13,0,100);state.locker=clamp(state.locker-(state.locker<55?8:3),0,100);log(`You called ${w.name}'s bluff. The locker room is watching.`,"warn")})]}}
function decMorale(w){return{title:`${w.name} Is Frustrated`,tag:"Locker Room",text:`${w.name} feels lost in the shuffle and says the locker room has no clear direction.`,choices:[choice("Give them a win","Morale +12 if they win this week.","Booking could upset a bigger name.",()=>{addCommit(`Win promise: ${w.name}`,1,`Have ${w.name} win a match this week.`,s=>s.winners.includes(w.id),()=>{w.morale=clamp(w.morale+15,0,100);w.momentum=clamp(w.momentum+8,0,100);log(`${w.name} got the promised win and feels valued.`,"good")},()=>{w.morale=clamp(w.morale-18,0,100);log(`${w.name} didn't get the promised win. Morale dropped.`,"bad")})}),choice("Private meeting","Locker room +4. Small morale gain.","No major momentum gain.",()=>{w.morale=clamp(w.morale+7,0,100);state.locker=clamp(state.locker+4,0,100);log(`You had a private meeting with ${w.name}. Things calmed down.`,"good")}),choice("Tell them to earn it","No promises. Hard-nosed culture.","Morale -10. Ego can become a problem.",()=>{w.morale=clamp(w.morale-10,0,100);w.ego=clamp(w.ego+4,0,100);state.locker=clamp(state.locker-2,0,100);log(`${w.name} was told to earn their spot. Not everyone loved it.`,"warn")})]}}
function decCreativeControl(w){return{title:`${w.name} Wants Creative Control`,tag:"Ego",text:`${w.name} wants protection in finishes and more say in their direction.`,choices:[choice("Give partial control","Morale +10. Star feels important.","Dirty/protected finishes lose less morale, but ego rises.",()=>{w.morale=clamp(w.morale+10,0,100);w.ego=clamp(w.ego+8,0,100);addCommit(`Protect ${w.name}`,3,`Avoid having ${w.name} lose clean for 3 shows.`,s=>!s.cleanLosers.includes(w.id),()=>{w.morale=clamp(w.morale+8,0,100);log(`${w.name} felt protected and stayed happy.`,"good")},()=>{w.morale=clamp(w.morale-18,0,100);log(`${w.name} lost clean after asking for protection. Egos are boiling.`,"bad")},"survive")}),choice("Refuse it","Keeps your booking authority.","Morale -14. Could lead to backstage issues.",()=>{w.morale=clamp(w.morale-14,0,100);state.locker=clamp(state.locker-4,0,100);log(`You refused creative control for ${w.name}.`,"warn")}),choice("Trade control for PR","Publicity boost and small fan gain.","Ego +12 and future demands get louder.",()=>{w.ego=clamp(w.ego+12,0,100);w.morale=clamp(w.morale+6,0,100);state.fans+=rnd(220,650);state.momentum=clamp(state.momentum+4,0,100);log(`${w.name} got a PR spotlight and leaned into the star act.`,"good")})]}}
function decInjury(w){return{title:`${w.name} Is Working Hurt`,tag:"Health",text:`Medical staff says ${w.name} is banged up. They can work, but the risk is real.`,choices:[choice("Rest them","Fatigue drops and injury risk lowers.","Fans may miss a regular name this week.",()=>{w.injured=Math.max(w.injured,1);w.fatigue=clamp(w.fatigue-28,0,100);w.morale=clamp(w.morale+4,0,100);log(`${w.name} was rested for health.`,"info")}),choice("Use them lightly","If booked in opener/showcase, small morale boost.","Dangerous matches could backfire badly.",()=>{addCommit(`Light duty: ${w.name}`,1,`If you book ${w.name}, keep them out of dangerous matches and away from the main event.`,s=>!s.dangerIds.includes(w.id)&&!s.mainIds.includes(w.id),()=>{w.fatigue=clamp(w.fatigue-10,0,100);w.morale=clamp(w.morale+4,0,100);log(`${w.name} worked light duty without trouble.`,"good")},()=>{w.injured=2;w.morale=clamp(w.morale-8,0,100);log(`${w.name} was pushed too hard while hurt and is now out.`,"bad")})}),choice("Push through it","Possible bigger rating if they deliver.","High injury and morale risk.",()=>{w.momentum=clamp(w.momentum+4,0,100);addCommit(`Risky gamble: ${w.name}`,1,`Book ${w.name} this week and hope the gamble pays off.`,s=>s.bookedIds.includes(w.id),()=>{if(Math.random()<.38){w.injured=rnd(2,4);log(`${w.name} got hurt after being pushed through pain.`,"bad")}else{w.momentum=clamp(w.momentum+10,0,100);state.momentum=clamp(state.momentum+4,0,100);log(`${w.name} survived the gamble and looked heroic.`,"good")}},()=>{w.morale=clamp(w.morale-8,0,100);log(`${w.name} expected to fight through pain but was left off. Mixed signals hurt morale.`,"warn")})})]}}
function decProspect(w){return{title:`Fans Are Buzzing About ${w.name}`,tag:"Star Building",text:`A small online clip has people saying ${w.name} might be the future. Your current stars may not love it.`,choices:[choice("Strap the rocket","Momentum +12 and fan excitement.","Veterans lose morale if the show rating is weak.",()=>{w.push="Midcard";w.momentum=clamp(w.momentum+12,0,100);state.heat=clamp(state.heat+5,0,100);addCommit(`Rocket push: ${w.name}`,2,`Feature ${w.name} at least once in the next 2 shows.`,s=>s.bookedIds.includes(w.id),()=>{w.overness=clamp(w.overness+6,0,100);state.fans+=rnd(250,700);log(`${w.name}'s rocket push created real buzz.`,"good")},()=>{w.morale=clamp(w.morale-12,0,100);state.fanSat=clamp(state.fanSat-5,0,100);log(`The fan buzz around ${w.name} cooled because you didn't follow up.`,"bad")})}),choice("Slow build","Safer development. Locker room stays calmer.","Less immediate hype.",()=>{w.skill=clamp(w.skill+2,0,100);w.safety=clamp(w.safety+3,0,100);state.locker=clamp(state.locker+2,0,100);log(`${w.name} will be slow-built instead of rushed.`,"info")}),choice("Feed them to a star","Top name gets momentum.","Fans may resent wasting a prospect.",()=>{const star=topRoster()[0]; if(star){star.momentum=clamp(star.momentum+6,0,100)} w.morale=clamp(w.morale-7,0,100);state.fanSat=clamp(state.fanSat-3,0,100);log(`${w.name}'s buzz was cooled off to protect the current top act.`,"warn")})]}}
function decTVScout(){return{title:"Streaming Platform Wants A Pilot",tag:"Business",text:"A tiny streaming platform wants to scout your next show. They care about production, crowd energy, and a clean finish to the main event.",choices:[choice("Go all-in","Potential huge reputation gain.","Costs $6,000 and rating must hit 64+.",()=>{state.cash-=6000;state.production=clamp(state.production+1,1,5);addCommit("Streaming pilot",1,"Score 64+ this week and avoid a dirty main event finish.",s=>s.rating>=64&&s.mainFinish!=="Dirty",()=>{state.reputation=clamp(state.reputation+8,0,100);state.fans+=rnd(1200,2600);state.sponsor=clamp(state.sponsor+6,0,100);log("The streaming scout loved the pilot. Your credibility jumped.","good")},()=>{state.reputation=clamp(state.reputation-3,0,100);state.cash-=1500;log("The streaming scout passed. The expensive pilot stung.","bad")})}),choice("Play it normal","No extra cost. Maybe the show wins them over anyway.","Smaller upside.",()=>{addCommit("Quiet scout",1,"Score 68+ this week for a small streaming meeting.",s=>s.rating>=68,()=>{state.reputation=clamp(state.reputation+3,0,100);state.fans+=rnd(500,1000);log("The quiet scout liked the show enough to keep talking.","good")},()=>{log("The scout watched, shrugged, and moved on.","info")})}),choice("Decline for now","Avoids pressure and cost.","You may miss a growth window.",()=>{state.locker=clamp(state.locker+1,0,100);log("You declined the streaming pilot until the company is more ready.","info")})]}}
function decVenueGamble(){return{title:"Venue Promoter Offers A Bigger Room",tag:"Growth Gamble",text:"A venue promoter has an opening. You can run a bigger building this week, but empty seats will make the promotion look cold.",choices:[choice("Book the bigger room","Higher attendance ceiling and rep upside.","Higher cost; bad crowd hurts momentum.",()=>{const order=["gym","bingo","armory","theater","arena"]; const idx=Math.min(order.indexOf(state.venue)+1,order.length-1); state.venue=order[idx]; if(booking) booking.venue=state.venue; addCommit("Bigger room gamble",1,"Fill at least 55% of the building this week.",s=>s.fill>=55,()=>{state.reputation=clamp(state.reputation+3,0,100);state.momentum=clamp(state.momentum+5,0,100);log("The bigger room looked alive. People are talking.","good")},()=>{state.momentum=clamp(state.momentum-7,0,100);state.fanSat=clamp(state.fanSat-4,0,100);log("The bigger room looked empty on camera. Momentum took a hit.","bad")});}),choice("Stay small and loud","Cheaper and safer crowd energy.","Limits ticket revenue.",()=>{const order=["gym","bingo","armory","theater","arena"]; state.venue=order[Math.max(0,order.indexOf(state.venue)-1)]; if(booking) booking.venue=state.venue; state.cash+=500;log("You chose the smaller room and protected the atmosphere.","info")}),choice("Negotiate cheaper rent","Reduce this week's venue cost.","Venue staff may cheap out on setup.",()=>{addEffect("Cheap rent",1,{venueDiscount:.35,productionPenalty:3},"Venue discount, but production suffers a little.");log("You negotiated cheaper rent. The venue may cut corners.","warn")})]}}
function decMerch(){return{title:"Merch Table Needs A Decision",tag:"Revenue",text:"Your merch guy says the table looks embarrassing. Better merch can make money, but only if fans care enough to buy.",choices:[choice("Invest in merch","Merch quality +1. Better long-term revenue.","Costs $3,500 now.",()=>{state.cash-=3500;state.merch=clamp(state.merch+1,1,5);log("You invested in better merch designs.","good")}),choice("Cheap bootleg shirts","+$1,200 quick cash.","Sponsor trust and reputation can take a small hit.",()=>{state.cash+=1200;state.sponsor=clamp(state.sponsor-3,0,100);state.reputation=clamp(state.reputation-1,0,100);log("The cheap merch brought quick cash, but it looked minor league.","warn")}),choice("Do nothing","No cost.","No revenue growth.",()=>log("You left the merch table alone this week.","info"))]}}
function decFanDemand(w){return{title:"Fans Demand A Clear Direction",tag:"Fan Base",text:"Your diehards are arguing online. Some want star power. Others want fresh faces. You need to set a tone.",choices:[choice("Push established stars","Top names gain momentum.","Prospects may lose morale.",()=>{topRoster().slice(0,3).forEach(w=>w.momentum=clamp(w.momentum+5,0,100));state.fanSat=clamp(state.fanSat+3,0,100);state.roster.filter(w=>w.push==="Enhancement").forEach(w=>w.morale=clamp(w.morale-2,0,100));log("You leaned on established names to stabilize the fan base.","good")}),choice("Youth movement","Prospects and enhancement talent get morale.","Top egos may complain if ratings dip.",()=>{state.roster.filter(w=>w.push==="Enhancement"||w.arch==="Prospect").forEach(w=>{w.morale=clamp(w.morale+7,0,100);w.momentum=clamp(w.momentum+3,0,100)});addCommit("Youth movement",2,"Book at least one prospect/enhancement wrestler on each of the next 2 shows.",s=>s.booked.some(w=>w.push==="Enhancement"||w.arch==="Prospect"),()=>{state.fanSat=clamp(state.fanSat+6,0,100);log("The youth movement gave the promotion fresh energy.","good")},()=>{state.fanSat=clamp(state.fanSat-5,0,100);log("You talked youth movement but didn't follow through.","bad")},"survive")}),choice("Ignore the noise","No promise, no cost.","Fan satisfaction -3.",()=>{state.fanSat=clamp(state.fanSat-3,0,100);log("You ignored the fan debate and stayed the course.","info")})]}}
function decLockerStandard(){return{title:"Set The Locker Room Standard",tag:"Culture",text:"Backstage has been sloppy. You can crack down, loosen up, or create a wrestler council.",choices:[choice("Crack down","Locker room +8 and reliability matters more.","Low-reliability workers lose morale.",()=>{state.locker=clamp(state.locker+8,0,100);state.roster.filter(w=>w.reliability<55).forEach(w=>w.morale=clamp(w.morale-6,0,100));addEffect("Strict locker room",3,{safeBonus:3,egoPenalty:2},"Safer shows, but egos hate the rules.");log("You set a stricter backstage standard.","good")}),choice("Let boys be boys","Egos calm down for now.","Locker room standards slip.",()=>{state.roster.filter(w=>w.ego>65).forEach(w=>w.morale=clamp(w.morale+6,0,100));state.locker=clamp(state.locker-7,0,100);log("You loosened the room. Egos liked it. Leaders did not.","warn")}),choice("Create talent council","Locker room +4 and fewer blowups.","Top stars gain influence.",()=>{state.locker=clamp(state.locker+4,0,100);topRoster().slice(0,2).forEach(w=>w.ego=clamp(w.ego+4,0,100));addEffect("Talent council",4,{moraleBuffer:3},"Morale drops are softened for a few weeks.");log("You created a talent council to keep issues from exploding.","good")})]}}
function decLoanShark(){
  return {title:"Cash Flow Is Tight",tag:"Money",text:"Bills are coming. You can cut spending, take a small loan, or gamble on marketing.",choices:[
    choice("Cut costs","+$2,000 savings and smaller weekly cost.","Fan satisfaction and production take a hit.",()=>{
      state.cash+=2000;state.production=clamp(state.production-1,1,5);state.fanSat=clamp(state.fanSat-4,0,100);
      addEffect("Cost cutting",2,{costCut:.15,ratingPenalty:3},"Lower costs but weaker show presentation.");
      log("You cut costs to buy breathing room.","warn");
    }),
    choice("Take a loan","+$8,000 cash now.","Debt increases by $10,000.",()=>{
      state.cash+=8000;state.debt+=10000;state.sponsor=clamp(state.sponsor-2,0,100);
      log("You took a short-term loan. The cash helps, but the debt is real.","warn");
    }),
    choice("Marketing gamble","Spend $3,000 to chase new fans.","If the show misses 58+, the campaign flops.",()=>{
      state.cash-=3000;state.marketing+=1200;
      addCommit("Marketing gamble",1,"Score 58+ this week to convert the campaign into fans.",s=>s.rating>=58,()=>{
        state.fans+=rnd(700,1600);state.momentum=clamp(state.momentum+4,0,100);
        log("The marketing gamble worked and brought in new fans.","good");
      },()=>{
        state.fanSat=clamp(state.fanSat-3,0,100);
        log("The marketing push brought people in, but the show didn't convert them.","bad");
      });
    })
  ]}
}

function addCommit(title,weeks,desc,test,onPass,onFail,mode="early"){state.commitments.push({id:id(),title,weeks,desc,mode,onPass,onFail,created:state.week,_test:test})}
function addEffect(title,weeks,mods,desc){state.commitments.push({id:id(),title,weeks,desc,effect:true,mods})}
function chooseDecision(did,ci){const d=state.pending.find(x=>x.id===did); if(!d) return; d.choices[ci].fn(); state.pending=state.pending.filter(x=>x.id!==did); render(); toast("Decision locked in");}

function tab(t){currentTab=t;$$('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));$$('.tabPanel').forEach(p=>p.classList.toggle('active',p.id===t));render()}
function render(){renderMetrics(); if(currentTab==="office")renderOffice(); if(currentTab==="booking")renderBooking(); if(currentTab==="roster")renderRoster(); if(currentTab==="market")renderMarket(); if(currentTab==="strategy")renderStrategy(); if(currentTab==="history")renderHistory();}
function renderMetrics(){const nt=nextTier();const tp=nt?`${Math.max(0,nt.fans-state.fans).toLocaleString()} fans to ${nt.name}`:"Top tier reached";$("#metrics").innerHTML=`
  ${metric("Cash",money(state.cash),state.debt?`Debt ${money(state.debt)}`:"No debt",state.cash<5000?"badTxt":"goodTxt")}
  ${metric("Fans",state.fans.toLocaleString(),tp,"goldTxt")}
  ${metric("Reputation",pct(state.reputation),tier().name,"blueTxt")}
  ${metric("Fan Mood",pct(state.fanSat),"Crowd patience",state.fanSat<45?"badTxt":"")}
  ${metric("Locker Room",pct(state.locker),"Backstage culture",state.locker<45?"badTxt":"")}
  ${metric("Sponsor Trust",pct(state.sponsor),"Business confidence",state.sponsor<35?"badTxt":"")}`}
function metric(a,b,c,cls=""){return`<div class="metric"><small>${a}</small><b class="${cls}">${b}</b><span class="sub">${c}</span></div>`}
function renderOffice(){const nt=nextTier();$("#office").innerHTML=`
  <div class="grid">
    <div class="panel">
      <div class="sectionTitle"><div><h2>Owner's Office</h2><p>Week ${state.week} · ${esc(tier().name)} · Goal: ${esc(tier().target)}</p></div><span class="pill gold">${state.pending.length} Decisions Waiting</span></div>
      ${state.lastShow?lastShowCard():`<div class="card"><h3>Welcome to the grind.</h3><p>You are not just booking matches. You are managing money, egos, fan trust, sponsor expectations, promises, and growth pressure.</p></div>`}
      <div class="grid3" style="margin-top:12px">${mini("Payroll",money(payroll()),"Per week before show costs")}${mini("Venue",venues[state.venue].name,venues[state.venue].desc)}${mini("Style",state.style,`Risk: ${state.risk}`)}</div>
    </div>
    <div class="panel alt">
      <h2>Active Fires</h2><p>These promises and effects carry consequences into future weeks.</p>${renderCommitments()}
    </div>
  </div>
  <div class="panel" style="margin-top:16px"><div class="sectionTitle"><div><h2>Owner's Inbox</h2><p>Every choice has pros, cons, and reactions.</p></div><button class="btn secondary" onclick="seedDecisions();render()">Refresh Inbox</button></div>${renderDecisions()}</div>
  <div class="panel alt" style="margin-top:16px"><h2>Latest News</h2>${renderNews(8)}</div>`}
function mini(a,b,c){return`<div class="card"><span class="tiny">${a}</span><h3>${b}</h3><p style="margin:.25rem 0 0">${c}</p></div>`}
function lastShowCard(){const s=state.lastShow;return`<div class="card"><div class="cardTop"><div><h3>Last Show: ${esc(s.name)}</h3><p>${venues[s.venue].name} · Rating ${s.rating} · Attendance ${s.attendance.toLocaleString()} / ${s.capacity.toLocaleString()} · Profit ${money(s.profit)}</p></div><span class="pill ${s.profit>=0?'good':'bad'}">${s.fanChange>=0?'+':''}${s.fanChange.toLocaleString()} fans</span></div><div class="bar"><span style="width:${clamp(s.rating,0,100)}%"></span></div></div>`}
function renderCommitments(){if(!state.commitments.length)return`<div class="empty">No active fires. Enjoy the quiet while it lasts.</div>`;return`<div class="list">${state.commitments.map(c=>`<div class="card"><div class="cardTop"><div><b>${esc(c.title)}</b><p style="margin:.25rem 0 0">${esc(c.desc)}</p></div><span class="pill ${c.effect?'blue':'gold'}">${c.weeks} show${c.weeks===1?'':'s'} left</span></div></div>`).join("")}</div>`}
function renderDecisions(){if(!state.pending.length)return`<div class="empty"><p>No inbox decisions left. Book and simulate your show.</p><button class="btn" onclick="tab('booking')">Book This Week's Show</button></div>`;return`<div class="list">${state.pending.map(d=>`<div class="card decision"><div class="cardTop"><div><span class="pill gold">${esc(d.tag)}</span><h3>${esc(d.title)}</h3><p>${esc(d.text)}</p></div></div><div class="choices">${d.choices.map((c,i)=>`<button class="choice" onclick="chooseDecision('${d.id}',${i})"><b>${esc(c.label)}</b><small class="pros">PRO: ${esc(c.pros)}</small><small class="cons">CON: ${esc(c.cons)}</small></button>`).join("")}</div></div>`).join("")}</div>`}
function renderNews(n=20){if(!state.news.length)return`<div class="empty">No news yet.</div>`;return`<div class="list">${state.news.slice(0,n).map(x=>`<div class="newsItem"><span class="dot ${x.type}"></span><div><b>Week ${x.week}</b><div class="tiny">${esc(x.msg)}</div></div></div>`).join("")}</div>`}

function renderBooking(){if(!booking)initBooking();const v=venues[booking.venue];$("#booking").innerHTML=`
  <div class="panel"><div class="sectionTitle"><div><h2>Book Show</h2><p>Choose the room, build the card, manage risk, and then live with the fallout.</p></div><div class="row"><button class="btn secondary" onclick="autoBook()">Autobook</button><button class="btn good" onclick="runShow()">Simulate Show</button></div></div>
  <div class="grid4"><div class="field"><label>Show Name</label><input value="${esc(booking.name)}" oninput="booking.name=this.value"></div><div class="field"><label>Show Type</label><select onchange="setShowType(this.value)"><option value="weekly" ${booking.showType==='weekly'?'selected':''}>Weekly Show</option><option value="big" ${booking.showType==='big'?'selected':''}>Big Show</option></select></div><div class="field"><label>Venue</label><select onchange="booking.venue=this.value;state.venue=this.value;render()">${Object.entries(venues).map(([k,v])=>`<option value="${k}" ${booking.venue===k?'selected':''}>${v.name} · ${money(v.cost)}</option>`).join("")}</select></div><div class="card"><b>${v.capacity.toLocaleString()} cap</b><div class="tiny">${esc(v.desc)}</div></div></div>
  </div>
  <div class="grid" style="margin-top:16px"><div><div class="panel alt"><h2>Card</h2>${booking.slots.map(renderSlot).join("")}</div></div><div><div class="panel alt"><h2>Booking Pressure</h2>${renderCommitments()}<hr style="border-color:var(--line);border-width:1px 0 0;margin:14px 0"><h3>Available Talent</h3><p class="tiny">Injured or exhausted workers are risky. Reusing someone too often can damage morale and safety.</p>${topRoster().slice(0,8).map(w=>`<div class="card"><b>${esc(w.name)}</b><div class="tiny">${w.push} · OVR ${w.overness} · MOR ${w.morale} · FAT ${w.fatigue}${w.injured?` · OUT ${w.injured}w`:''}</div></div>`).join("")}</div></div></div>`}
function renderSlot(slot,i){const mt=matchTypes[slot.type];return`<div class="match"><div class="cardTop"><h3>${i+1}. ${esc(slot.stakes)}</h3><span class="pill ${mt.risk>12?'red':'blue'}">Risk ${mt.risk}</span></div><div class="matchGrid"><div class="field"><label>Match Type</label><select onchange="slotChange(${i},'type',this.value)">${Object.entries(matchTypes).map(([k,m])=>`<option value="${k}" ${slot.type===k?'selected':''}>${m.name}</option>`).join("")}</select></div><div class="field"><label>Stakes</label><select onchange="slotChange(${i},'stakes',this.value)">${["Opener","Showcase","Grudge Match","Contender Match","Co-Main","Main Event"].map(s=>`<option ${slot.stakes===s?'selected':''}>${s}</option>`).join("")}</select></div><div class="field"><label>Finish</label><select onchange="slotChange(${i},'finish',this.value)">${["Clean","Dirty","Protected","Double Countout"].map(s=>`<option ${slot.finish===s?'selected':''}>${s}</option>`).join("")}</select></div><div class="field"><label>Extras</label><div class="row"><label class="pill"><input type="checkbox" ${slot.promo?'checked':''} onchange="slotChange(${i},'promo',this.checked)"> Promo</label><label class="pill"><input type="checkbox" ${slot.title?'checked':''} onchange="slotChange(${i},'title',this.checked)"> Title</label></div></div>${Array.from({length:mt.count},(_,wi)=>`<div class="field ${wi>1?'wide':''}"><label>Wrestler ${wi+1}</label><select onchange="setW(${i},${wi},this.value)"><option value="">Select talent</option>${state.roster.map(w=>`<option value="${w.id}" ${slot.wrestlers[wi]===w.id?'selected':''} ${w.injured?'disabled':''}>${w.name} · ${w.push} · OVR ${w.overness} · Fat ${w.fatigue}</option>`).join("")}</select></div>`).join("")}</div></div>`}
function slotChange(i,key,val){booking.slots[i][key]=val; if(key==="type"){const need=matchTypes[val].count;booking.slots[i].wrestlers=booking.slots[i].wrestlers.slice(0,need)}renderBooking()}
function setW(i,wi,val){booking.slots[i].wrestlers[wi]=val; renderBooking()}
function setShowType(v){state.showType=v;booking.showType=v;initBooking();renderBooking()}
function autoBook(){const list=topRoster().filter(w=>!w.injured);let idx=0;booking.slots.forEach((s,i)=>{s.wrestlers=[];const need=matchTypes[s.type].count;for(let n=0;n<need;n++){s.wrestlers.push(list[(idx+n)%list.length]?.id)}idx+=need;s.stakes=i===booking.slots.length-1?"Main Event":i===0?"Opener":"Showcase";});toast("Card autobooked");renderBooking()}

function runShow(){const err=validate(); if(err){modal("Booking Problem",`<p>${err}</p>`,[{label:"Fix card",cls:"btn",fn:closeModal}]);return}
  const v=venues[booking.venue];const bookedIds=[];const dangerIds=[];const winners=[];const cleanLosers=[];let totalRating=0,totalRisk=0,usedDanger=false,matchCost=0;const matchRows=[];
  booking.slots.forEach((s,i)=>{const ws=s.wrestlers.map(wrestler);const mt=matchTypes[s.type];totalRisk+=mt.risk;matchCost+=mt.cost;if(mt.risk>=14)usedDanger=true;if(mt.risk>=14)dangerIds.push(...s.wrestlers);bookedIds.push(...s.wrestlers);
    const heat=ws.reduce((sum,w)=>sum+(w.overness*.28+w.momentum*.22+w.skill*.18+w.charisma*.14+w.look*.1-w.fatigue*.12+(pushValue[w.push]||0)*.28),0)/ws.length;
    const place=i===booking.slots.length-1?9:i===0?3:5;const promo=s.promo?Math.max(...ws.map(w=>w.charisma))*0.08:0;const title=s.title?4:0;const finish=s.finish==="Clean"?2:s.finish==="Protected"?1:s.finish==="Dirty"?-1:-3;const styleBonus=styleMod(s,ws);
    const rating=clamp(Math.round(heat+mt.fan+place+promo+title+finish+styleBonus+rnd(-5,7)),18,99);totalRating+=rating;
    const win=pickWinner(ws,s);winners.push(win.id);win.wins++;win.momentum=clamp(win.momentum+rnd(4,9)+(s.title?3:0),0,100);win.overness=clamp(win.overness+(rating>65?2:1),0,100);if(s.title)state.title=win.id;
    ws.forEach(w=>{w.lastBooked=state.week;w.fatigue=clamp(w.fatigue+mt.risk+rnd(3,10),0,100);w.morale=clamp(w.morale+(w.id===win.id?3:-2),0,100);if(w.id!==win.id){w.losses++;w.momentum=clamp(w.momentum-(s.finish==="Clean"?4:1),0,100);if(s.finish==="Clean")cleanLosers.push(w.id)}});
    if(mt.risk+ws.reduce((a,w)=>a+(100-w.safety)/14,0)+rnd(0,14)>34){const hurt=ws.sort((a,b)=>a.safety-b.safety||b.fatigue-a.fatigue)[0];if(Math.random()<.22){hurt.injured=rnd(1,4);log(`${hurt.name} got hurt in the ${mt.name}.`,"bad")}}
    matchRows.push({name:mt.name,rating,win:win.name,workers:ws.map(w=>w.name),finish:s.finish,title:s.title});
  });
  const avgRating=Math.round(totalRating/booking.slots.length);const effectMods=currentMods();const prodBoost=state.production*3+(effectMods.productionPenalty?-effectMods.productionPenalty:0);const showRating=clamp(avgRating+prodBoost+Math.round(state.momentum/12)+v.rep+(state.showType==='big'?5:0)-(effectMods.ratingPenalty||0),10,100);
  const demand=Math.max(80,Math.round(state.fans*(.18+state.reputation/360+state.momentum/380)+state.marketing/3+showRating*8));const attendance=Math.min(v.capacity,demand);const fill=Math.round(attendance/v.capacity*100);
  const ticketPenalty=state.ticket>24?(state.ticket-24)*attendance*.18:0;const ticketRev=attendance*state.ticket-ticketPenalty;const merchRev=attendance*(1.2+state.merch*.75)*(1+topRoster()[0].overness/190);const sponsorRev=(700+state.sponsor*38)*(state.showType==='big'?2.1:1);let costs=v.cost+state.production*1600+state.marketing+payroll()+matchCost;if(effectMods.venueDiscount)costs-=v.cost*effectMods.venueDiscount;if(effectMods.costCut)costs*=1-effectMods.costCut;const profit=Math.round(ticketRev+merchRev+sponsorRev-costs);
  const fanChange=Math.round((showRating-50)*18+(fill-45)*10+(state.showType==='big'?showRating*10:0)+rnd(-90,130));state.cash+=profit;state.fans=Math.max(75,state.fans+fanChange);state.reputation=clamp(state.reputation+(showRating>68?2:showRating<45?-2:showRating>58?1:0),0,100);state.fanSat=clamp(state.fanSat+(showRating>60?4:showRating<45?-7:0)+(usedDanger?1:0),0,100);state.momentum=clamp(state.momentum+(showRating-52)/5+(fill>65?4:-2),0,100);state.sponsor=clamp(state.sponsor+(usedDanger?-2:1)+(showRating>65?2:0),0,100);
  state.roster.forEach(w=>{if(!bookedIds.includes(w.id)&&!w.injured){w.fatigue=clamp(w.fatigue-rnd(8,15),0,100);if(w.push==="Ace"||w.push==="Upper Card")w.morale=clamp(w.morale-2,0,100)} if(w.injured>0 && !bookedIds.includes(w.id)){w.injured--;w.fatigue=clamp(w.fatigue-18,0,100);if(w.injured===0)log(`${w.name} has been cleared to return.`,"good")}});
  const snapshot={rating:showRating,totalRisk,usedDanger,bookedIds,booked:bookedIds.map(wrestler).filter(Boolean),dangerIds,mainIds:booking.slots.at(-1).wrestlers,winners,cleanLosers,mainFinish:booking.slots.at(-1).finish,fill};
  resolveCommitments(snapshot);handleMoney();state.lastShow={name:booking.name,venue:booking.venue,rating:showRating,attendance,capacity:v.capacity,profit,fanChange,matches:matchRows};hist({name:booking.name,rating:showRating,profit,fanChange,attendance,matches:matchRows});
  afterShowEvents(showRating,profit,usedDanger);state.week++;state.showType=state.week%4===0?"big":"weekly";seedDecisions();initBooking();saveGame(false);
  modal("Show Results",resultHtml(state.lastShow),[{label:"Continue to Owner's Office",cls:"btn",fn:()=>{closeModal();tab('office')}}]);render();}
function validate(){for(let i=0;i<booking.slots.length;i++){const s=booking.slots[i],need=matchTypes[s.type].count;if(s.wrestlers.filter(Boolean).length<need)return`Match ${i+1} needs ${need} wrestlers.`;if(new Set(s.wrestlers).size<s.wrestlers.length)return`Match ${i+1} has the same wrestler selected twice.`;for(const wid of s.wrestlers){const w=wrestler(wid);if(!w)return`Match ${i+1} has an invalid wrestler.`;if(w.injured)return`${w.name} is unavailable for ${w.injured} more week(s).`}}return null}
function styleMod(s,ws){if(state.style==="Sports Entertainment")return(s.promo?4:0)+ws.reduce((a,w)=>a+w.charisma,0)/ws.length*.03;if(state.style==="Workrate")return ws.reduce((a,w)=>a+w.skill,0)/ws.length*.05;if(state.style==="Hardcore")return matchTypes[s.type].risk>=14?6:-1;if(state.style==="Old School")return s.finish==="Clean"?3:-2;return 0}
function pickWinner(ws,s){let sorted=[...ws].sort((a,b)=>(scoreW(b)+rnd(-20,20))-(scoreW(a)+rnd(-20,20)));if(s.title&&state.title){const champ=ws.find(w=>w.id===state.title);if(champ&&Math.random()<.62)return champ}return sorted[0]}
function currentMods(){return state.commitments.filter(c=>c.effect).reduce((m,c)=>Object.assign(m,c.mods),{})}
function resolveCommitments(snap){
  const remain=[];
  for(const c of state.commitments){
    if(c.effect){
      c.weeks--;
      if(c.weeks>0) remain.push(c); else log(`${c.title} expired.`,"info");
      continue;
    }
    let pass=false;
    try{ pass=c._test?c._test(snap):false }catch(e){ pass=false }
    if(c.mode==="survive"){
      if(!pass){ c.onFail&&c.onFail(); continue; }
      c.weeks--;
      if(c.weeks<=0){ c.onPass&&c.onPass(); } else remain.push(c);
    } else {
      if(pass){ c.onPass&&c.onPass(); continue; }
      c.weeks--;
      if(c.weeks<=0){ c.onFail&&c.onFail(); } else remain.push(c);
    }
  }
  state.commitments=remain;
}
function handleMoney(){if(state.cash<0){state.debt+=Math.abs(state.cash);state.cash=0;state.sponsor=clamp(state.sponsor-4,0,100);log("You borrowed money to cover the week. Debt hurt sponsor confidence.","bad")} if(state.debt>0&&state.cash>7000){const pay=Math.min(state.cash-5000,Math.ceil(state.debt*.15));state.cash-=pay;state.debt-=pay;log(`You paid ${money(pay)} toward debt.`,"info")}}
function afterShowEvents(rating,profit,usedDanger){
  if(rating<42){state.locker=clamp(state.locker-4,0,100);log("The show landed flat. Fans questioned the direction.","bad")} if(rating>70){state.heat=clamp(state.heat+5,0,100);log("The show created real buzz. Rival promoters noticed.","good")}
  const unhappy=state.roster.filter(w=>w.morale<35&&!w.injured); if(unhappy.length&&Math.random()<.35){const w=pick(unhappy);w.complaints++;log(`${w.name} is openly unhappy backstage.`,"warn"); if(w.complaints>2&&Math.random()<.45){state.roster=state.roster.filter(x=>x.id!==w.id);state.freeAgents.unshift(w);log(`${w.name} walked out and hit the open market.`,"bad")}}
  if(usedDanger&&Math.random()<.28){state.sponsor=clamp(state.sponsor-6,0,100);log("Sponsors were nervous about the dangerous match footage.","warn")}
  if(profit<0&&Math.random()<.3)state.pending.push(decLoanShark());
  refreshMarket();
}
function resultHtml(s){return`<p><strong>${esc(s.name)}</strong> drew ${s.attendance.toLocaleString()} fans in the ${venues[s.venue].name}. Rating: <strong>${s.rating}</strong>. Profit: <strong class="${s.profit>=0?'goodTxt':'badTxt'}">${money(s.profit)}</strong>. Fan change: <strong>${s.fanChange>=0?'+':''}${s.fanChange.toLocaleString()}</strong>.</p><div class="list">${s.matches.map((m,i)=>`<div class="card"><b>${i+1}. ${m.name}${m.title?' · TITLE':''}</b><div class="tiny">${m.workers.map(esc).join(' vs ')} · Winner: ${esc(m.win)} · ${m.finish} finish · Rating ${m.rating}</div></div>`).join("")}</div>`}

function renderRoster(){const champ=wrestler(state.title);$("#roster").innerHTML=`<div class="panel"><div class="sectionTitle"><div><h2>Roster</h2><p>Champion: ${champ?esc(champ.name):"Vacant"} · Payroll: ${money(payroll())}/week</p></div><button class="btn secondary" onclick="restRoster()">Rest Everyone</button></div><div class="rosterGrid">${state.roster.map(wCard).join("")}</div></div>`}
function wCard(w){return`<div class="wCard"><div class="cardTop"><div><h3>${esc(w.name)}</h3><div class="tiny">${esc(w.gimmick)} · ${w.arch} · Age ${w.age}</div></div><span class="pill ${w.id===state.title?'gold':w.injured?'bad':'blue'}">${w.id===state.title?'Champion':w.injured?`Out ${w.injured}w`:w.push}</span></div><div class="statline"><div><b>${w.overness}</b><div class="tiny">Over</div></div><div><b>${w.momentum}</b><div class="tiny">Momo</div></div><div><b>${w.morale}</b><div class="tiny">Morale</div></div><div><b>${w.skill}</b><div class="tiny">Skill</div></div><div><b>${w.charisma}</b><div class="tiny">Promo</div></div><div><b>${w.fatigue}</b><div class="tiny">Fatigue</div></div></div><div class="bar"><span style="width:${w.morale}%"></span></div><p class="tiny">Pay ${money(w.pay)}/wk · Contract ${w.contract}w · Ego ${w.ego} · Reliability ${w.reliability} · ${w.wins}-${w.losses}</p><div class="row"><button class="miniBtn" onclick="setPush('${w.id}')">Change Push</button><button class="miniBtn" onclick="makeChamp('${w.id}')">Make Champ</button><button class="miniBtn" onclick="renew('${w.id}')">Renew</button><button class="miniBtn" onclick="releaseW('${w.id}')">Release</button></div></div>`}
function setPush(wid){const w=wrestler(wid);const arr=["Enhancement","Midcard","Upper Card","Ace"];w.push=arr[(arr.indexOf(w.push)+1)%arr.length];w.morale=clamp(w.morale+2,0,100);renderRoster()}
function makeChamp(wid){state.title=wid;const w=wrestler(wid);w.morale=clamp(w.morale+7,0,100);w.momentum=clamp(w.momentum+5,0,100);log(`${w.name} was named champion.`,"good");render()}
function renew(wid){const w=wrestler(wid);const cost=Math.round(w.pay*2.5);if(state.cash<cost){toast("Not enough cash");return}state.cash-=cost;w.contract+=18;w.morale=clamp(w.morale+8,0,100);log(`${w.name} signed an 18-week extension.`,"good");render()}
function releaseW(wid){const w=wrestler(wid);modal("Release Talent",`<p>Release ${esc(w.name)}? It saves payroll but hurts locker room morale.</p>`,[{label:"Release",cls:"btn bad",fn:()=>{state.roster=state.roster.filter(x=>x.id!==wid);state.locker=clamp(state.locker-5,0,100);if(state.title===wid)state.title=state.roster[0]?.id||null;closeModal();render()}},{label:"Cancel",cls:"btn secondary",fn:closeModal}])}
function restRoster(){state.roster.forEach(w=>w.fatigue=clamp(w.fatigue-20,0,100));state.momentum=clamp(state.momentum-2,0,100);log("You gave the roster a lighter week of training and recovery.","info");render()}

function renderMarket(){const can=state.freeAgents;$("#market").innerHTML=`<div class="panel"><div class="sectionTitle"><div><h2>Free Agents</h2><p>Signing talent is exciting until payroll chokes the company.</p></div><button class="btn secondary" onclick="paidScout()">Paid Scout ${money(1500)}</button></div><div class="rosterGrid">${can.map(faCard).join("")}</div></div>`}
function faCard(w){return`<div class="wCard"><div class="cardTop"><div><h3>${esc(w.name)}</h3><div class="tiny">${w.gimmick} · ${w.arch}</div></div><span class="pill gold">${money(w.pay)}/wk</span></div><div class="statline"><div><b>${w.overness}</b><div class="tiny">Over</div></div><div><b>${w.skill}</b><div class="tiny">Skill</div></div><div><b>${w.charisma}</b><div class="tiny">Promo</div></div></div><p class="tiny">Ego ${w.ego} · Reliability ${w.reliability} · Best use: ${bestUse(w)}</p><button class="btn" onclick="signFA('${w.id}')">Sign Talent</button></div>`}
function bestUse(w){if(w.charisma>70)return"promo-heavy star";if(w.skill>70)return"workrate anchor";if(w.look>72)return"monster/attraction";if(w.safety<38)return"use carefully";return"depth piece"}
function signFA(wid){const w=state.freeAgents.find(x=>x.id===wid);if(!w)return;const bonus=Math.round(w.pay*3);if(state.cash<bonus){toast("Need signing bonus: "+money(bonus));return}state.cash-=bonus;w.contract=rnd(14,28);w.morale=70;state.roster.push(w);state.freeAgents=state.freeAgents.filter(x=>x.id!==wid);log(`${w.name} signed with the company.`,"good");render()}
function paidScout(){if(state.cash<1500){toast("Not enough cash");return}state.cash-=1500;state.freeAgents.unshift(makeW({base:rnd(55,75),pay:rnd(650,1500)}));log("Your scout found a better free agent.","good");render()}
function refreshMarket(){if(Math.random()<.35){state.freeAgents.unshift(makeW({base:rnd(34,70)}));state.freeAgents=state.freeAgents.slice(0,14)}}

function renderStrategy(){$("#strategy").innerHTML=`<div class="grid"><div class="panel"><h2>Company Strategy</h2><p>These settings shape show ratings, costs, sponsors, and fan reaction.</p><div class="grid3"><div class="field"><label>Product Style</label><select onchange="state.style=this.value;render()">${["Balanced","Sports Entertainment","Workrate","Hardcore","Old School"].map(x=>`<option ${state.style===x?'selected':''}>${x}</option>`).join("")}</select></div><div class="field"><label>Production Level</label><select onchange="state.production=Number(this.value);render()">${[1,2,3,4,5].map(x=>`<option value="${x}" ${state.production===x?'selected':''}>${x} · ${money(x*1600)}/show</option>`).join("")}</select></div><div class="field"><label>Ticket Price</label><select onchange="state.ticket=Number(this.value);render()">${[12,16,18,22,26,30].map(x=>`<option value="${x}" ${state.ticket===x?'selected':''}>${money(x)}</option>`).join("")}</select></div><div class="field"><label>Marketing Spend</label><select onchange="state.marketing=Number(this.value);render()">${[0,500,900,1500,2500,4000].map(x=>`<option value="${x}" ${state.marketing===x?'selected':''}>${money(x)}/show</option>`).join("")}</select></div><div class="field"><label>Default Venue</label><select onchange="state.venue=this.value;if(booking)booking.venue=this.value;render()">${Object.entries(venues).map(([k,v])=>`<option value="${k}" ${state.venue===k?'selected':''}>${v.name}</option>`).join("")}</select></div><div class="field"><label>Merch Quality</label><select onchange="state.merch=Number(this.value);render()">${[1,2,3,4,5].map(x=>`<option value="${x}" ${state.merch===x?'selected':''}>${x}</option>`).join("")}</select></div></div></div><div class="panel alt"><h2>Business Readout</h2>${mini("Estimated fixed cost",money(payroll()+venues[state.venue].cost+state.production*1600+state.marketing),"Before match gimmick costs")}${mini("Current tier",tier().name,tier().target)}${mini("Next leap",nextTier()?nextTier().name:"None","Grow fans and reputation")}</div></div>`}
function renderHistory(){$("#history").innerHTML=`<div class="panel"><h2>Company History</h2>${state.history.length?`<div class="list">${state.history.map(h=>`<div class="card"><div class="cardTop"><div><b>Week ${h.week}: ${esc(h.name)}</b><p style="margin:.25rem 0 0">Rating ${h.rating} · Attendance ${h.attendance.toLocaleString()} · Profit ${money(h.profit)} · Fans ${h.fanChange>=0?'+':''}${h.fanChange.toLocaleString()}</p></div></div></div>`).join("")}</div>`:`<div class="empty">No shows yet.</div>`}</div><div class="panel alt" style="margin-top:16px"><h2>News Archive</h2>${renderNews(30)}</div>`}

function saveGame(show=true){localStorage.setItem(STORAGE_KEY,JSON.stringify({state,booking}));if(show)toast("Game saved")}
function loadGame(){const raw=localStorage.getItem(STORAGE_KEY);if(!raw){toast("No save found");return}const data=JSON.parse(raw);state=data.state;booking=data.booking;state.commitments=(state.commitments||[]).filter(c=>c.effect);state.pending=[];seedDecisions();log("Loaded save. Fresh owner inbox generated.","info");render();toast("Game loaded")}
function modal(title,body,actions=[]){$("#modalHost").innerHTML=`<div class="modalRoot"><div class="modal"><h2>${esc(title)}</h2>${body}<div class="modalActions">${actions.map((a,i)=>`<button class="${a.cls||'btn'}" data-act="${i}">${esc(a.label)}</button>`).join("")}</div></div></div>`;actions.forEach((a,i)=>$(`[data-act="${i}"]`).onclick=a.fn)}
function closeModal(){$("#modalHost").innerHTML=""}

newGame();
</script>
</body>
</html>
